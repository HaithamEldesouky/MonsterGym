<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Monster Gym</title>
  <meta name="description" content="Get in touch with Monster Gym — address, phone and website." />
  <link rel="icon" href="assets/img/icon.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script>(function(){try{var t=localStorage.getItem('mg-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body data-page="contact">
  <div id="site-header"></div>

  <main>
    <section class="page-head">
      <div class="container">
        <span class="eyebrow">Contact</span>
        <h1>Get in touch</h1>
        <p>Questions about memberships or classes? We'd love to hear from you.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-list">
            <div class="contact-item">
              <div class="ci-icon"><img src="assets/img/location.png" alt="" /></div>
              <div>
                <h3>Address</h3>
                <p>Almaza, Heliopolis, Cairo Governorate</p>
              </div>
            </div>
            <div class="contact-item">
              <div class="ci-icon"><img src="assets/img/earth.png" alt="" /></div>
              <div>
                <h3>Website</h3>
                <p><a href="index.html">www.monstergym.com</a></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="ci-icon"><img src="assets/img/phone.png" alt="" /></div>
              <div>
                <h3>Telephone</h3>
                <p><a href="tel:+201099586277">(+20) 109 958 6277</a></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="ci-icon" style="font-size:1.4rem">⏰</div>
              <div>
                <h3>Opening hours</h3>
                <p>Open 24 / 7, every day of the week</p>
              </div>
            </div>
          </div>
          <iframe
            class="map-embed"
            title="Monster Gym location map"
            loading="lazy"
            src="https://maps.google.com/maps?q=Almaza%2C%20Heliopolis%2C%20Cairo&t=&z=13&ie=UTF8&iwloc=&output=embed"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
