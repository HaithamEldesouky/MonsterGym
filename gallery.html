<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Monster Gym</title>
  <meta name="description" content="Take a look inside Monster Gym — photos from our branches." />
  <link rel="icon" href="assets/img/icon.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script>(function(){try{var t=localStorage.getItem('mg-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body data-page="gallery">
  <div id="site-header"></div>

  <main>
    <section class="page-head">
      <div class="container">
        <span class="eyebrow">Gallery</span>
        <h1>Branch Photos</h1>
        <p>Take a look inside Monster Gym. Click any photo to view it full size.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="gallery-grid" id="galleryGrid">
          <figure><img src="assets/img/gallery/1.jpeg" alt="Monster Gym branch photo 1" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/2.jpeg" alt="Monster Gym branch photo 2" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/3.jpeg" alt="Monster Gym branch photo 3" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/4.jpeg" alt="Monster Gym branch photo 4" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/5.jpeg" alt="Monster Gym branch photo 5" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/6.jpeg" alt="Monster Gym branch photo 6" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/7.jpeg" alt="Monster Gym branch photo 7" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/8.jpeg" alt="Monster Gym branch photo 8" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/9.jpeg" alt="Monster Gym branch photo 9" loading="lazy" /></figure>
          <figure><img src="assets/img/gallery/10.jpeg" alt="Monster Gym branch photo 10" loading="lazy" /></figure>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
